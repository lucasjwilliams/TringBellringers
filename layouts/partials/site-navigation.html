<nav class="site-nav pv3 ph3 ph4-ns" role="navigation">
  <div class="site-nav-inner">
    <a href="{{ .Site.Home.RelPermalink }}" class="site-logo-link" aria-label="{{ $.Site.Title }} home">
      {{ with .Site.Params.site_logo }}
        <img
          src="{{ relURL . }}"
          class="site-logo"
          alt="{{ $.Site.Title }}"
        />
      {{ else }}
        <span class="f3 fw2 white-90">{{ .Site.Title }}</span>
      {{ end }}
    </a>

    <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="site-menu">
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>

    <div class="site-menu" id="site-menu">
      {{ partial "i18nlist.html" . }}
      {{ if .Site.Menus.main }}
        <ul class="site-menu-list">
          {{ range .Site.Menus.main }}
            <li class="site-menu-item f5 fw4">
              <a class="site-menu-link no-underline white-90 {{ with .Params.class }}{{ . }}{{ end }}" href="{{ .URL }}" title="{{ i18n "pageTitle" . }}">
                {{ .Name }}
              </a>
            </li>
          {{ end }}
        </ul>
      {{ end }}
      {{ partialCached "social-follow.html" . }}
    </div>
  </div>
</nav>

<script>
(function () {
  var btn = document.getElementById('hamburger-btn');
  var menu = document.getElementById('site-menu');
  var topbar = document.querySelector('.site-topbar');
  if (!btn || !menu) return;

  function openMenu() {
    menu.style.top = (topbar ? topbar.offsetHeight : 0) + 'px';
    menu.classList.add('is-open');
    btn.setAttribute('aria-expanded', 'true');
    btn.classList.add('is-active');
    document.body.style.overflow = 'hidden';
  }

  function closeMenu() {
    menu.classList.remove('is-open');
    btn.setAttribute('aria-expanded', 'false');
    btn.classList.remove('is-active');
    document.body.style.overflow = '';
  }

  btn.addEventListener('click', function () {
    menu.classList.contains('is-open') ? closeMenu() : openMenu();
  });
})();
</script>
